<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoLink Web Preview</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><div class="brand-mark">A</div><div><strong>AutoLink</strong><span>Communication OS</span></div></div>
        <nav>
          <a class="active">Dashboard</a><a>Automation</a><a>Platforms</a><a>Reports</a><a>Subscription</a><a>Profile</a>
        </nav>
        <button class="ghost-button">Logout</button>
      </aside>
      <main>
        <header class="topbar">
          <div><span class="eyebrow">Unified automation</span><h1>Manage every channel from one dashboard</h1></div>
          <div class="top-actions"><button class="icon-button">Alerts</button><button class="primary-button">New automation</button></div>
        </header>
        <section class="page-grid">
          <article class="metric-card"><span>Connected platforms</span><strong>4</strong></article>
          <article class="metric-card"><span>Active automations</span><strong>18</strong></article>
          <article class="metric-card"><span>Scheduled messages</span><strong>9</strong></article>
          <article class="metric-card"><span>Replies this week</span><strong>428</strong></article>
          <article class="wide-panel">
            <div class="panel-heading"><h2>Automation activity</h2><span class="status-badge success">Live</span></div>
            <div class="activity-chart"><span style="height:45%"></span><span style="height:68%"></span><span style="height:52%"></span><span style="height:82%"></span><span style="height:76%"></span><span style="height:91%"></span><span style="height:64%"></span></div>
          </article>
          <article class="panel">
            <h2>Quick actions</h2>
            <button class="action-row">Create auto-reply</button>
            <button class="action-row">Schedule message</button>
            <button class="action-row">Connect platform</button>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
