<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoLink Admin Preview</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside>
        <div class="brand"><div class="brand-mark">A</div><div><strong>AutoLink</strong><span>Admin Control</span></div></div>
        <nav>
          <a class="active">Dashboard</a><a>Users</a><a>Automations</a><a>Platforms</a><a>Subscriptions</a><a>Reports</a><a>Settings</a>
        </nav>
        <button class="plain-button">Logout</button>
      </aside>
      <main>
        <header>
          <div><span>System monitoring</span><h1>Admin dashboard</h1></div>
          <label class="search"><input placeholder="Search users, automations, reports" /></label>
        </header>
        <section class="grid">
          <article class="metric"><span>Total users</span><strong>1,284</strong></article>
          <article class="metric"><span>Active automations</span><strong>6,910</strong></article>
          <article class="metric"><span>Connected platforms</span><strong>3,672</strong></article>
          <article class="metric"><span>Monthly revenue</span><strong>KES 426K</strong></article>
          <article class="panel span-3">
            <h2>Automation throughput</h2>
            <div class="bars"><i style="height:52%"></i><i style="height:70%"></i><i style="height:63%"></i><i style="height:88%"></i><i style="height:76%"></i><i style="height:94%"></i><i style="height:81%"></i></div>
          </article>
          <article class="panel">
            <h2>System health</h2>
            <div class="health">API online</div><div class="health">Worker queue ready</div><div class="health">Reports active</div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
